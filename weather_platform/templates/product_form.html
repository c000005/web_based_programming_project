<!-- web_based_programming_project/weather_platform/templates/product_form.html -->
{% include "_header.html" %}

{% include "_nav.html" %}

<div class="card" style="max-width: 600px; margin: 0 auto;">
    <div class="card-header" style="background: linear-gradient(135deg, #11998e 0%, #38ef7d 100%);">
        <h2>🛒 افزودن محصول جدید</h2>
        <p style="opacity: 0.9; margin-top: 5px;">ثبت محصول یا خدمت جدید</p>
    </div>

    <form action="/weather_platform/products/new" method="POST">
        <div class="form-group">
            <label for="name">نام محصول <span class="required">*</span></label>
            <input type="text" id="name" name="name" class="form-control" required>
        </div>

        <div class="form-group">
            <label for="description">توضیحات</label>
            <textarea id="description" name="description" class="form-control" rows="4"></textarea>
        </div>

        <div class="form-group">
            <label for="price">قیمت (تومان)</label>
            <input type="number" id="price" name="price" step="1000" min="0" class="form-control">
        </div>

        <div class="form-group">
            <label for="category">دسته‌بندی</label>
            <select id="category" name="category" class="form-control">
                <option value="">انتخاب دسته‌بندی</option>
                <option value="subscription">📅 اشتراک</option>
                <option value="api_access">🔌 دسترسی API</option>
                <option value="custom_report">📊 گزارش سفارشی</option>
            </select>
        </div>

        <div class="form-group">
            <label style="display: flex; align-items: center; cursor: pointer;">
                <input type="checkbox" name="is_active" value="1" checked style="width: 20px; height: 20px; margin-left: 10px;">
                <span>محصول فعال باشد</span>
            </label>
        </div>

        <div style="display: flex; gap: 10px;">
            <button type="submit" class="btn btn-success" style="flex: 1;">✅ افزودن محصول</button>
            <a href="/weather_platform/dashboard" class="btn btn-secondary" style="flex: 1; text-align: center;">❌ انصراف</a>
        </div>
    </form>
</div>
{% include "_footer.html" %}
