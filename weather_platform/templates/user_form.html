<!-- web_based_programming_project/weather_platform/templates/user_form.html -->

{% include "_header.html" %}

{% include "_nav.html" %}

<div class="card" style="max-width: 600px; margin: 0 auto;">
    <div class="card-header" style="background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);">
        <h2>👤 ثبت نام کاربر جدید</h2>
        <p style="opacity: 0.9; margin-top: 5px;">ایجاد حساب کاربری در سامانه</p>
    </div>

    <form action="/weather_platform/users/new" method="POST">
        <div class="form-group">
            <label for="username">نام کاربری <span class="required">*</span></label>
            <input type="text" id="username" name="username" class="form-control" required>
        </div>

        <div class="form-group">
            <label for="password_hash">رمز عبور <span class="required">*</span></label>
            <input type="password" id="password_hash" name="password_hash" class="form-control" required>
        </div>

        <div class="form-group">
            <label for="email">ایمیل <span class="required">*</span></label>
            <input type="email" id="email" name="email" class="form-control" required>
        </div>

        <div class="form-group">
            <label for="full_name">نام کامل</label>
            <input type="text" id="full_name" name="full_name" class="form-control">
        </div>

        <div class="form-group">
            <label for="role">نقش کاربری</label>
            <select id="role" name="role" class="form-control">
                <option value="viewer">👀 Viewer</option>
                <option value="analyst">📊 Analyst</option>
                <option value="admin">👑 Admin</option>
            </select>
        </div>

        <div style="display: flex; gap: 10px;">
            <button type="submit" class="btn btn-primary" style="flex: 1;">✅ ثبت نام</button>
            <a href="/weather_platform/dashboard" class="btn btn-secondary" style="flex: 1; text-align: center;">❌ انصراف</a>
        </div>
    </form>
</div>
{% include "_footer.html" %}
