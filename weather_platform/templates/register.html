<!DOCTYPE html>
<html lang="fa-IR" dir="rtl">
<head>
    <title>ثبت‌نام - سامانه تحلیل هواشناسی</title>
    <meta charset="utf-8">
    <style>
        body { font-family: sans-serif; padding: 20px; background: #e6f7ff; }
        .container { max-width: 500px; margin: auto; background: white; padding: 20px; border-radius: 10px; }
        label { display: block; margin-top: 10px; font-weight: bold; }
        input { width: 100%; padding: 8px; margin-top: 5px; box-sizing: border-box; }
        input[type=submit] { background: #28a745; color: white; border: none; cursor: pointer; margin-top: 20px; }
        .success { color: green; }
        .error { color: red; }
    </style>
</head>
<body>
    <div class="container">
        <h1>📝 ثبت‌نام در سامانه تحلیلی هواشناسی</h1>
        {% if success %}
            <p class="success">✅ ثبت‌نام موفق! اکنون می‌توانید وارد شوید.</p>
        {% elif error %}
            <p class="error">❌ {{ error }}</p>
        {% endif %}
        <form method="POST" action="/register">
            <label>نام کاربری:</label>
            <input type="text" name="username" required>
            <label>ایمیل:</label>
            <input type="email" name="email" required>
            <label>رمز عبور:</label>
            <input type="password" name="password" required>
            <label>نقش کاربری (admin/analyst/guest):</label>
            <input type="text" name="role" value="guest">
            <input type="submit" value="ثبت‌نام">
        </form>
        <p><a href="/">← بازگشت به صفحه اصلی</a></p>
    </div>
</body>
</html>
