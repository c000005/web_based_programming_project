<!DOCTYPE html>
<html lang="fa-IR" dir="rtl">
<head>
    <title>ثبت‌نام - سامانه تحلیل هواشناسی</title>
    <meta charset="utf-8">
    <link rel = "stylesheet" type = "text/css" href = "css/style.css">
</head>
<body>
    <div class="container">
        <h1>📝 ثبت‌نام در سامانه تحلیلی هواشناسی</h1>
        {% if success %}
            <p class="success">✅ ثبت‌نام موفق! اکنون می‌توانید وارد شوید.</p>
        {% elif error %}
            <p class="error">❌ {{ error }}</p>
        {% endif %}
        <form method="POST" action="">
            <label>نام کاربری:</label>
            <label>
                <input type="text" name="username" required>
            </label>
            <label>ایمیل:</label>
            <label>
                <input type="email" name="email" required>
            </label>
            <label>رمز عبور:</label>
            <label>
                <input type="password" name="password" required>
            </label>
            <label>نقش کاربری (admin/analyst/guest):</label>
            <label>
                <input type="text" name="role" value="guest">
            </label>
            <input type="submit" value="ثبت‌نام">
        </form>
        <p><a href="/">← بازگشت به صفحه اصلی</a></p>
    </div>
</body>
</html>
