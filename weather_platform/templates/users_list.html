{% include "_header.html" %}

<div class="header" style="background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);">
    <h1>📋 لیست کاربران سیستم</h1>
    <p>مدیریت و مشاهده اطلاعات کاربران</p>
</div>

{% include "_nav.html" %}

<!-- Table -->
<div class="card">
    <div class="table-wrapper">
        <table>
            <thead>
                <tr>
                    <th>ID</th>
                    <th>نام کاربری</th>
                    <th>ایمیل</th>
                    <th>نام کامل</th>
                    <th>نقش</th>
                    <th>وضعیت</th>
                    <th>تاریخ ثبت نام</th>
                    <th>عملیات</th>
                </tr>
            </thead>
            <tbody>
                {{ users_rows }}
            </tbody>
        </table>
    </div>
    <div class="text-center mt-20" style="color: #666;">
        📊 نمایش تمام کاربران ثبت نام شده در سیستم
    </div>
</div>

<!-- Add some CSS for badges -->
<style>
    .badge {
        display: inline-block;
        padding: 4px 12px;
        border-radius: 20px;
        font-size: 0.8em;
        font-weight: bold;
    }
    .badge-primary {
        background: #667eea;
        color: white;
    }
    .badge-success {
        background: #10b981;
        color: white;
    }
    .badge-danger {
        background: #ef4444;
        color: white;
    }
    .badge-warning {
        background: #f59e0b;
        color: white;
    }
    .badge-info {
        background: #3b82f6;
        color: white;
    }
    .btn-sm {
        padding: 5px 12px;
        font-size: 0.85em;
        border-radius: 6px;
        text-decoration: none;
        display: inline-block;
    }
    .btn-primary {
        background: #667eea;
        color: white;
    }
    .btn-primary:hover {
        background: #5a6fd6;
        color: white;
    }
</style>
