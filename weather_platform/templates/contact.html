<!DOCTYPE html>

<html lang="fa-IR" dir="rtl">

<head>

    <title>فرم تماس ساده</title>

    <meta charset="utf-8">

    <style>

        body { font-family: sans-serif; padding: 20px;



        }

        label { display: block; margin-top: 10px; }

        input[type=text], input[type=email], textarea { width: 250px; padding: 8px; margin-top: 5px; }

        input[type=submit] { margin-top: 15px; padding: 10px 15px; cursor: pointer; }

    </style>

</head>

<body>

    <h1>ارسال اطلاعات تماس</h1>

    <!-- اکشن فرم به آدرس سرور پایتون اشاره دارد -->

    <form method="POST" action="/">

        <label for="name">نام:</label>

        <input type="text" id="name" name="name" required>

        <label for="email">ایمیل:</label>

        <input type="email" id="email" name="email" required>

        <label for="message">متن پیام:</label>

        <textarea id="message" name="message" required></textarea>

        <br>

        <input type="submit" value="ارسال">

    </form>

</body>

</html>
