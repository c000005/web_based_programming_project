<!DOCTYPE html>
<html lang="fa-IR" dir="rtl">
<head>
    <title>تماس با ما - سامانه تحلیل هواشناسی</title>
    <meta charset="utf-8">
    <link rel = "stylesheet" type = "text/css" href = "css/style.css">
</head>
<body>
    <div class="container">
        <h1>📧 تماس با مدیریت سامانه هواشناسی</h1>
        {% if success %}
            <p class="success">✅ پیام شما با موفقیت ارسال شد.</p>
        {% elif error %}
            <p class="error">❌ خطا در ارسال پیام. لطفاً دوباره تلاش کنید.</p>
        {% endif %}
        <form method="POST" action="">
            <label>نام و نام خانوادگی:</label>
            <label>
                <input type="text" name="name" required>
            </label>
            <label>ایمیل:</label>
            <label>
                <input type="email" name="email" required>
            </label>
            <label>پیام شما:</label>
            <label>
                <textarea name="message" rows="5" required></textarea>
            </label>
            <input type="submit" value="ارسال پیام">
        </form>
        <p><a href="/">← بازگشت به صفحه اصلی</a></p>
    </div>
</body>
</html>
