<!DOCTYPE html>
<html lang="fa-IR" dir="rtl">
<head>
    <title>تماس با ما - سامانه تحلیل هواشناسی</title>
    <meta charset="utf-8">
    <style>
        body { font-family: sans-serif; padding: 20px; background: #e6f7ff; }
        .container { max-width: 500px; margin: auto; background: white; padding: 20px; border-radius: 10px; }
        label { display: block; margin-top: 10px; font-weight: bold; }
        input, textarea { width: 100%; padding: 8px; margin-top: 5px; box-sizing: border-box; }
        input[type=submit] { background: #0077be; color: white; border: none; cursor: pointer; margin-top: 20px; }
        .success { color: green; }
        .error { color: red; }
    </style>
</head>
<body>
    <div class="container">
        <h1>📧 تماس با مدیریت سامانه هواشناسی</h1>
        {% if success %}
            <p class="success">✅ پیام شما با موفقیت ارسال شد.</p>
        {% elif error %}
            <p class="error">❌ خطا در ارسال پیام. لطفاً دوباره تلاش کنید.</p>
        {% endif %}
        <form method="POST" action="/contact">
            <label>نام و نام خانوادگی:</label>
            <input type="text" name="name" required>
            <label>ایمیل:</label>
            <input type="email" name="email" required>
            <label>پیام شما:</label>
            <textarea name="message" rows="5" required></textarea>
            <input type="submit" value="ارسال پیام">
        </form>
        <p><a href="/">← بازگشت به صفحه اصلی</a></p>
    </div>
</body>
</html>
