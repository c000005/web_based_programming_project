<!-- web_based_programming_project/weather_platform/templates/weather_list.html -->

<div class="header" style="background: linear-gradient(135deg, #f7971e 0%, #ffd200 100%);">
    <h1>🌤️ داده‌های هواشناسی</h1>
    <p>۵۰ رکورد آخر</p>
</div>

<!-- Navigation -->
<div class="nav">
    <a href="/weather_platform/dashboard">🏠 داشبورد</a>
    <a href="/weather_platform/weather/list" class="active">🌤 هواشناسی</a>
</div>

<!-- Table -->
<div class="card">
    <div class="table-wrapper">
        <table>
            <thead>
                <tr>
                    <th>ID</th>
                    <th>ایستگاه</th>
                    <th>شهر</th>
                    <th>کشور</th>
                    <th>تاریخ</th>
                    <th>دما(°C)</th>
                    <th>رطوبت(%)</th>
                    <th>فشار(hPa)</th>
                    <th>سرعت باد(m/s)</th>
                    <th>وضعیت</th>
                </tr>
            </thead>
            <tbody>
                {{weather_rows}}
            </tbody>
        </table>
    </div>
    <div class="text-center mt-20" style="color: #666;">
        📊 نمایش ۵۰ رکورد آخر داده‌های هواشناسی
    </div>
</div>
