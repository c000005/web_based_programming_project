<!DOCTYPE html>
<html dir="rtl" lang="fa">
<head>
    <meta charset="UTF-8">
    <title>داده‌های هواشناسی</title>
    <style>
        body { font-family: Tahoma, Arial; max-width: 1300px; margin: 20px auto; padding: 20px; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; font-size: 14px; }
        th, td { border: 1px solid #ddd; padding: 8px; text-align: right; }
        th { background-color: #2ecc71; color: white; }
        tr:nth-child(even) { background-color: #f2f2f2; }
        h1 { color: #2c3e50; }
        .back-link { display: inline-block; margin-top: 20px; color: #2ecc71; text-decoration: none; }
    </style>
</head>
<body>
    <h1>🌤️ داده‌های هواشناسی (۵۰ رکورد آخر)</h1>
    <table>
        <thead>
            <tr>
                <th>ID</th><th>ایستگاه</th><th>شهر</th><th>کشور</th><th>تاریخ</th>
                <th>دما(°C)</th><th>رطوبت(%)</th><th>فشار(hPa)</th><th>سرعت باد(m/s)</th><th>وضعیت</th>
            </tr>
        </thead>
        <tbody>
            {{weather_rows}}
        </tbody>
    </table>
    <a href="/dashboard" class="back-link">← بازگشت به داشبورد</a>
</body>
</html>
