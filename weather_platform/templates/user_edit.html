<!-- web_based_programming_project/weather_platform/templates/user_edit.html -->

{% include "_header.html" %}

{% include "_nav.html" %}

<div class="container" style="max-width: 600px; margin: 0 auto;">

    <div class="card" style="max-width: 600px; margin: 0 auto;">
        <div class="card-header" style="background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);">
            <h2>✏️ ویرایش اطلاعات کاربر</h2>
            <p style="opacity: 0.9; margin-top: 5px;">در حال ویرایش کاربر با شناسه {{ user_id }}</p>
        </div>

        <form action="/weather_platform/admin/users/edit/{{ user_id }}" method="POST">
            <div class="form-group">
                <label for="username">نام کاربری <span class="required">*</span></label>
                <input type="text" id="username" name="username" value="{{ username }}" class="form-control" required>
            </div>

            <div class="form-group">
                <label for="email">ایمیل <span class="required">*</span></label>
                <input type="email" id="email" name="email" value="{{ email }}" class="form-control" required>
            </div>

            <div class="form-group">
                <label for="full_name">نام کامل</label>
                <input type="text" id="full_name" name="full_name" value="{{ full_name }}" class="form-control">
            </div>

            <div class="form-group">
                <label for="role">نقش کاربری</label>
                <select id="role" name="role" class="form-control">
                    <option value="admin" {% if role == 'admin' %}selected{% endif %}>👑 مدیر</option>
                    <option value="analyst" {% if role == 'analyst' %}selected{% endif %}>📊 تحلیل‌گر</option>
                    <option value="viewer" {% if role == 'viewer' %}selected{% endif %}>👀 بیننده</option>
                </select>
            </div>

            <div class="form-group">
                <label style="display: flex; align-items: center; cursor: pointer;">
                    <input type="checkbox" name="is_active" value="1" {{ is_active_checked }} style="width: 20px; height: 20px; margin-left: 10px;">
                    <span>کاربر فعال باشد</span>
                </label>
            </div>

            <div style="display: flex; gap: 10px;">
                <button type="submit" class="btn btn-primary" style="flex: 1;">💾 ذخیره تغییرات</button>
                <a href="/weather_platform/admin/users" class="btn btn-secondary" style="flex: 1; text-align: center;">❌ انصراف</a>
            </div>
        </form>
    </div>
</div>

{% include "_footer.html" %}
