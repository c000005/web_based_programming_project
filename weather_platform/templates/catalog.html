<!-- web_based_programming_project/weather_platform/templates/catalog.html -->
{% include "_header.html" %}

{% include "_nav.html" %}

<style>
    .product-card .product-image {
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        height: 150px;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 4em;
    }
    .search-bar {
        display: flex;
        gap: 15px;
        margin-bottom: 25px;
        flex-wrap: wrap;
    }
    .search-input {
        flex: 1;
        min-width: 200px;
    }
    .filter-select {
        min-width: 150px;
    }
</style>

<div class="header">
    <h1>🛍 کاتالوگ محصولات</h1>
    <p>محصولات و خدمات متنوع ما را مشاهده کنید</p>
</div>

<!-- Search and Filter -->
<div class="search-bar">
    <div class="search-input">
        <input type="text" id="searchInput" placeholder="🔍 جستجوی محصولات..."
               class="form-control" onkeyup="filterProducts()">
    </div>
    <div class="filter-select">
        <select id="categorySelect" class="form-control" onchange="filterProducts()">
            <option value="all">همه دسته‌بندی‌ها</option>
            <option value="subscription">📅 اشتراک</option>
            <option value="api_access">🔌 دسترسی API</option>
            <option value="custom_report">📊 گزارش سفارشی</option>
        </select>
    </div>
</div>

<!-- Products Grid -->
<div class="product-grid" id="productsGrid">
    {{catalog_cards}}
</div>

<!-- Stats -->
<div class="card text-center" id="stats">
    در حال بارگذاری...
</div>

<script>
    function filterProducts() {
        const searchTerm = document.getElementById('searchInput').value.toLowerCase();
        const category = document.getElementById('categorySelect').value;
        const cards = document.querySelectorAll('.product-card');
        let visibleCount = 0;

        cards.forEach(card => {
            const title = card.getAttribute('data-title') || '';
            const description = card.getAttribute('data-description') || '';
            const cardCategory = card.getAttribute('data-category') || '';

            const matchesSearch = title.includes(searchTerm) || description.includes(searchTerm);
            const matchesCategory = category === 'all' || cardCategory === category;

            if (matchesSearch && matchesCategory) {
                card.style.display = 'block';
                visibleCount++;
            } else {
                card.style.display = 'none';
            }
        });

        document.getElementById('stats').innerHTML = `📊 ${visibleCount} محصول یافت شد`;
    }

    document.addEventListener('DOMContentLoaded', function() {
        filterProducts();
    });
</script>
{% include "_footer.html" %}
