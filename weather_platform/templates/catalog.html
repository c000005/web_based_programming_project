{% extends "base.html" %}

{% block title %}کاتالوگ محصولات{% endblock %}

{% block extra_css %}
<style>
    .product-card {
        transition: all 0.3s ease;
    }
    .product-card:hover {
        transform: translateY(-8px);
    }
</style>
{% endblock %}

{% block content %}
<div class="container mx-auto px-4 py-8">
    <!-- Header -->
    <div class="text-center text-white mb-10">
        <h1 class="text-5xl font-bold mb-4">🛍 کاتالوگ محصولات</h1>
        <p class="text-xl text-purple-100">محصولات و خدمات متنوع ما را مشاهده کنید</p>
    </div>

    <!-- Navigation -->
    <div class="bg-white rounded-xl shadow-lg p-4 mb-8 flex flex-wrap gap-3 justify-center">
        <a href="/weather_platform/dashboard" class="px-4 py-2 bg-purple-100 text-purple-700 rounded-lg hover:bg-purple-600 hover:text-white transition-all duration-300">🏠 داشبورد</a>
        <a href="/weather_platform/products/list" class="px-4 py-2 bg-teal-100 text-teal-700 rounded-lg hover:bg-teal-600 hover:text-white transition-all duration-300">📋 لیست محصولات</a>
        <a href="/weather_platform/register" class="px-4 py-2 bg-green-100 text-green-700 rounded-lg hover:bg-green-600 hover:text-white transition-all duration-300">👤 ثبت نام</a>
        <a href="/weather_platform/contact" class="px-4 py-2 bg-blue-100 text-blue-700 rounded-lg hover:bg-blue-600 hover:text-white transition-all duration-300">📞 تماس با ما</a>
    </div>

    <!-- Filter Bar -->
    <div class="bg-white rounded-xl shadow-lg p-6 mb-8">
        <div class="flex flex-col md:flex-row gap-4">
            <div class="flex-1">
                <input type="text" id="searchInput" placeholder="🔍 جستجوی محصولات..."
                       class="w-full px-4 py-3 border border-gray-300 rounded-xl focus:outline-none focus:ring-2 focus:ring-purple-500 focus:border-transparent"
                       onkeyup="filterProducts()">
            </div>
            <div>
                <select id="categorySelect" onchange="filterProducts()"
                        class="w-full md:w-auto px-4 py-3 border border-gray-300 rounded-xl focus:outline-none focus:ring-2 focus:ring-purple-500">
                    <option value="all">همه دسته‌بندی‌ها</option>
                    <option value="subscription">📅 اشتراک</option>
                    <option value="api_access">🔌 دسترسی API</option>
                    <option value="custom_report">📊 گزارش سفارشی</option>
                </select>
            </div>
        </div>
    </div>

    <!-- Products Grid -->
    <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8 mb-8" id="productsGrid">
        {{catalog_cards}}
    </div>

    <!-- Stats -->
    <div class="bg-white rounded-xl shadow-lg p-4 text-center text-gray-600" id="stats">
        در حال بارگذاری...
    </div>
</div>

<script>
    function filterProducts() {
        const searchTerm = document.getElementById('searchInput').value.toLowerCase();
        const category = document.getElementById('categorySelect').value;
        const cards = document.querySelectorAll('.product-card');
        let visibleCount = 0;

        cards.forEach(card => {
            const title = card.getAttribute('data-title') || '';
            const description = card.getAttribute('data-description') || '';
            const cardCategory = card.getAttribute('data-category') || '';

            const matchesSearch = title.includes(searchTerm) || description.includes(searchTerm);
            const matchesCategory = category === 'all' || cardCategory === category;

            if (matchesSearch && matchesCategory) {
                card.style.display = 'block';
                visibleCount++;
            } else {
                card.style.display = 'none';
            }
        });

        document.getElementById('stats').innerHTML = `📊 ${visibleCount} محصول یافت شد`;
    }

    document.addEventListener('DOMContentLoaded', function() {
        filterProducts();
    });
</script>
{% endblock %}
