<!-- web_based_programming_project/weather_platform/templates/login.html -->

{% include "_header.html" %}

<div class="container mx-auto px-4 py-8 max-w-md">
    <div class="bg-white rounded-2xl shadow-2xl overflow-hidden">
        <!-- Header -->
        <div class="bg-gradient-to-r from-purple-600 to-indigo-600 px-6 py-8 text-center">
            <div class="text-5xl mb-3">🔐</div>
            <h1 class="text-3xl font-bold text-white">ورود به سیستم</h1>
            <p class="text-purple-200 mt-2">به پلتفرم هواشناسی خوش آمدید</p>
        </div>

        <!-- Error Message - Simple conditional with HTML comment -->
        {{ error_html }}

        <!-- Login Form -->
        <form action="/weather_platform/login" method="POST" class="p-8">
            <div class="mb-6">
                <label class="block text-gray-700 font-bold mb-2" for="username">
                    نام کاربری <span class="text-red-500">*</span>
                </label>
                <div class="relative">
                    <span class="absolute right-3 top-3 text-gray-400">👤</span>
                    <input type="text"
                           id="username"
                           name="username"
                           placeholder="نام کاربری خود را وارد کنید"
                           required
                           class="w-full px-4 py-3 pr-10 border border-gray-300 rounded-xl focus:outline-none focus:ring-2 focus:ring-purple-500 focus:border-transparent">
                </div>
            </div>

            <div class="mb-8">
                <label class="block text-gray-700 font-bold mb-2" for="password">
                    رمز عبور <span class="text-red-500">*</span>
                </label>
                <div class="relative">
                    <span class="absolute right-3 top-3 text-gray-400">🔑</span>
                    <input type="password"
                           id="password"
                           name="password"
                           placeholder="رمز عبور خود را وارد کنید"
                           required
                           class="w-full px-4 py-3 pr-10 border border-gray-300 rounded-xl focus:outline-none focus:ring-2 focus:ring-purple-500 focus:border-transparent">
                </div>
            </div>

            <button type="submit"
                    class="w-full bg-gradient-to-r from-purple-600 to-indigo-600 text-white py-3 rounded-xl hover:from-purple-700 hover:to-indigo-700 transition-all duration-300 font-bold text-lg">
                🚀 ورود
            </button>
        </form>

        <!-- Footer Links -->
        <div class="bg-gray-50 border-t border-gray-200 px-8 py-4 text-center">
            <p class="text-gray-600 text-sm">
                حساب کاربری ندارید؟
                <a href="/weather_platform/register" class="text-purple-600 hover:text-purple-800 font-bold">ثبت نام کنید</a>
            </p>
            <p class="text-gray-500 text-xs mt-2">
                💡 کاربران پیش‌فرض: admin / admin123
            </p>
        </div>
    </div>
</div>

{% include "_footer.html" %}
