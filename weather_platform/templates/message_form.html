<!-- web_based_programming_project/weather_platform/templates/message_form.html -->
{% include "_header.html" %}

{% include "_nav.html" %}

<div class="card" style="max-width: 600px; margin: 0 auto;">
    <div class="card-header" style="background: linear-gradient(135deg, #eb3349 0%, #f45c43 100%);">
        <h2>✉️ ارسال پیام جدید</h2>
        <p style="opacity: 0.9; margin-top: 5px;">تماس با تیم پشتیبانی</p>
    </div>

    <form action="/weather_platform/messages/new" method="POST">
        <div class="form-group">
            <label for="name">نام و نام خانوادگی <span class="required">*</span></label>
            <input type="text" id="name" name="name" class="form-control" required>
        </div>

        <div class="form-group">
            <label for="email">ایمیل <span class="required">*</span></label>
            <input type="email" id="email" name="email" class="form-control" required>
        </div>

        <div class="form-group">
            <label for="subject">موضوع</label>
            <input type="text" id="subject" name="subject" class="form-control">
        </div>

        <div class="form-group">
            <label for="message">متن پیام <span class="required">*</span></label>
            <textarea id="message" name="message" class="form-control" rows="5" required></textarea>
        </div>

        <div style="display: flex; gap: 10px;">
            <button type="submit" class="btn btn-danger" style="flex: 1;">📨 ارسال پیام</button>
            <a href="/weather_platform/dashboard" class="btn btn-secondary" style="flex: 1; text-align: center;">❌ انصراف</a>
        </div>
    </form>
</div>
{% include "_footer.html" %}
