<!-- web_based_programming_project/weather_platform/templates/add_weather.html -->
{% include "_header.html" %}

<div class="card" style="max-width: 600px; margin: 0 auto;">
    <div class="card-header" style="background: linear-gradient(135deg, #f7971e 0%, #ffd200 100%);">
        <h2>🌤️ ثبت داده هواشناسی</h2>
        <p style="opacity: 0.9; margin-top: 5px;">ثبت اطلاعات جدید ایستگاه هواشناسی</p>
    </div>
    {% include "_nav.html" %}
    <form action="/weather_platform/add_weather" method="POST">
        <div class="form-group">
            <label for="station_code">کد ایستگاه <span class="required">*</span></label>
            <input type="text" id="station_code" name="station_code" class="form-control" required>
        </div>

        <div class="form-row">
            <div class="form-group">
                <label for="city_name">شهر <span class="required">*</span></label>
                <input type="text" id="city_name" name="city_name" class="form-control" required>
            </div>
            <div class="form-group">
                <label for="country">کشور <span class="required">*</span></label>
                <input type="text" id="country" name="country" class="form-control" required>
            </div>
        </div>

        <div class="form-group">
            <label for="record_date">تاریخ ثبت <span class="required">*</span></label>
            <input type="date" id="record_date" name="record_date" class="form-control" required>
        </div>

        <div class="form-row">
            <div class="form-group">
                <label for="temperature">دما (°C)</label>
                <input type="number" step="0.1" id="temperature" name="temperature" class="form-control">
            </div>
            <div class="form-group">
                <label for="humidity">رطوبت (%)</label>
                <input type="number" step="0.1" id="humidity" name="humidity" min="0" max="100" class="form-control">
            </div>
        </div>

        <div class="form-row">
            <div class="form-group">
                <label for="pressure">فشار (hPa)</label>
                <input type="number" step="0.1" id="pressure" name="pressure" class="form-control">
            </div>
            <div class="form-group">
                <label for="wind_speed">سرعت باد (m/s)</label>
                <input type="number" step="0.1" id="wind_speed" name="wind_speed" class="form-control">
            </div>
        </div>

        <div class="form-group">
            <label for="weather_condition">وضعیت هوا</label>
            <select id="weather_condition" name="weather_condition" class="form-control">
                <option value="">انتخاب کنید</option>
                <option value="sunny">☀️ آفتابی</option>
                <option value="cloudy">☁️ ابری</option>
                <option value="rainy">🌧️ بارانی</option>
                <option value="stormy">⛈️ طوفانی</option>
                <option value="snowy">❄️ برفی</option>
            </select>
        </div>

        <div style="display: flex; gap: 10px;">
            <button type="submit" class="btn btn-warning" style="flex: 1;">💾 ثبت داده</button>
            <a href="/weather_platform/dashboard" class="btn btn-secondary" style="flex: 1; text-align: center;">❌ انصراف</a>
        </div>
    </form>
</div>
{% include "_footer.html" %}
