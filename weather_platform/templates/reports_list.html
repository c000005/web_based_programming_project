<!DOCTYPE html>
<html dir="rtl" lang="fa">
<head>

                <th>منطقه</th><th>دسترسی</th><th>بازدید</th><th>تاریخ ایجاد</th>
            </tr>
        </thead>
        <tbody>
            {{reports_rows}}
        </tbody>
    </table>
    <a href="/dashboard">← بازگشت به داشبورد</a>

</html>
